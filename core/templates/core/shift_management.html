{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 mt-4">
                <div class="card-body p-4 text-center">
                    <div class="mb-3">
                        <span class="fs-1">🏪</span>
                    </div>
                    <h3 class="fw-bold mb-2">{% translate "Начало рабочей смены" %}</h3>
                    <p class="text-muted small mb-4">
                        {% translate "Касса заблокирована. Пожалуйста, введите сумму разменных денег для открытия дня." %}
                    </p>
                    
                    <div class="alert alert-danger fw-bold py-2 mb-4">
                        🔴 {% translate "СМЕНА ЗАКРЫТА" %}
                    </div>
                    
                    <form action="{% url 'toggle_shift' %}" method="POST" class="text-start">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">{% translate "Сумма в кассе (размен сом)" %}:</label>
                            <input type="number" name="start_cash" class="form-control form-control-lg text-center fw-bold text-success" value="0" min="0" required autofocus>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 py-2 fw-bold text-uppercase shadow-sm">
                            🟢 {% translate "Открыть смену и перейти к столам" %}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
