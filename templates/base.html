<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shashlyk POS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #1e1e24; color: #f5f5f6; font-family: system-ui, sans-serif; }
        .navbar { background-color: #2b2b36 !important; border-bottom: 2px solid #ff4d4d; }
        .card-table { background: #2b2b36; border: none; transition: transform 0.2s; border-radius: 12px; }
        .card-table:hover { transform: translateY(-3px); }
        .table-free { border-left: 6px solid #2ecc71; }
        .table-busy { border-left: 6px solid #e74c3c; }
        .menu-btn { background: #3a3a4a; color: white; border: 1px solid #4e4e62; padding: 12px; font-weight: bold; }
        .menu-btn:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-danger" href="{% url 'waiter_dashboard' %}">🔥 SHASHLYK POS</a>
            <span class="navbar-text text-light">
                Пользователь: <strong class="text-white">{{ user.username }}</strong>
            </span>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}info{% endif %} bg-dark text-white border-0 shadow">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</body>
</html>
