{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в POS-систему — SHASHLYK POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
        }
        .btn-login {
            background-color: #212529;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .btn-login:hover {
            background-color: #343a40;
        }
        .form-control {
            padding: 12px;
            border-radius: 10px;
        }
        .text-logo-accent {
            color: #1c200f !important;
        }
    </style>
</head>
<body>

<div class="card login-card p-4 bg-white">
    <div class="text-center mb-4">
        <!-- Убрали шар, сделали чистый текстовый логотип как в шапке -->
        <h3 class="fw-bold text-logo-accent tracking-wide">SHASHLYK POS</h3>
        <p class="text-muted small">Введите ваши данные для доступа к системе</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="alert alert-danger py-2 small border-0 text-center" role="alert">
                Неверное имя пользователя или пароль
            </div>
        {% endif %}

        <div class="mb-3">
            <label for="id_username" class="form-label text-muted small fw-medium">Имя пользователя / Официант</label>
            <input type="text" name="username" autofocus maxlength="150" class="form-control" required id="id_username" placeholder="Например: Иван">
        </div>

        <div class="mb-4">
            <label for="id_password" class="form-label text-muted small fw-medium">Пароль (Пин-код)</label>
            <input type="password" name="password" class="form-control" required id="id_password" placeholder="••••">
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100 text-white">
            Войти в систему
        </button>
    </form>
</div>

</body>
</html>
